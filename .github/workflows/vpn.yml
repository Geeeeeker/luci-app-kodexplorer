name: VPN Server with Auto-Public-URL
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install VPN & Tools
        run: |
          # 1. 安装 localtunnel (用于公网映射)
          sudo npm install -g localtunnel
          
          # 2. 启动 VPN 容器
          docker run \
            --name ipsec-vpn-server \
            -p 500:500/udp \
            -p 4500:4500/udp \
            -e VPN_USER=root \
            -e VPN_PASSWORD=passwd \
            -e VPN_IPSEC_PSK=1 \
            -d --privileged \
            hwdsl2/ipsec-vpn-server

      - name: Start 5656 Monitor
        run: |
          # 启动 Python 监控并在后台运行
          python3 -c "
          from http.server import BaseHTTPRequestHandler, HTTPServer
          import subprocess
          class H(BaseHTTPRequestHandler):
              def do_GET(self):
                  self.send_response(200)
                  self.send_header('Content-type', 'text/plain; charset=utf-8')
                  self.end_headers()
                  ip = subprocess.getoutput('curl -s https://api.ipify.org')
                  info = f'--- VPN STATUS ---\nStatus: Running\nUser: root\nPass: passwd\nPSK: 1\nPublic IP: {ip}\nPorts: 500/UDP, 4500/UDP\n'
                  self.wfile.write(info.encode())
          HTTPServer(('0.0.0.0', 5656), H).serve_forever()" &

      - name: Expose Monitor to Public Web
        run: |
          echo "------------------------------------------------------"
          echo "正在生成公网访问链接..."
          echo "注意：点击链接后，如果提示输入 IP，请输入：$(curl -s https://api.ipify.org)"
          echo "------------------------------------------------------"
          
          # 启动隧道并将输出打印到日志
          lt --port 5656
