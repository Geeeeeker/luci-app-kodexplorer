name: Ultimate-Reality-Proxy
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Xray & ngrok
        run: |
          # 1. 使用 sudo 安装 Xray
          curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh | sudo bash -s -- install
          
          # 2. 安装 ngrok
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok

      - name: Generate Reality Config
        id: vars
        run: |
          # 生成运行参数
          UUID=$(xray uuid)
          KEYS=$(xray x25519)
          PRIVATE_KEY=$(echo "$KEYS" | sed -n '1p' | awk '{print $3}')
          PUBLIC_KEY=$(echo "$KEYS" | sed -n '2p' | awk '{print $3}')
          SHORT_ID=$(openssl rand -hex 8)
          
          echo "uuid=$UUID" >> $GITHUB_OUTPUT
          echo "pub=$PUBLIC_KEY" >> $GITHUB_OUTPUT
          echo "sid=$SHORT_ID" >> $GITHUB_OUTPUT

          # 写入配置文件
          cat <<EOF > config.json
          {
            "inbounds": [{
              "port": 443,
              "protocol": "vless",
              "settings": {
                "clients": [{"id": "$UUID", "flow": "xtls-rprx-vision"}],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "tcp",
                "security": "reality",
                "realitySettings": {
                  "show": false,
                  "dest": "www.microsoft.com:443",
                  "xver": 0,
                  "serverNames": ["www.microsoft.com"],
                  "privateKey": "$PRIVATE_KEY",
                  "shortIds": ["$SHORT_ID"]
                }
              }
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          EOF

      - name: Start Services
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          # 启动服务
          sudo xray -c config.json &
          ngrok config add-authtoken $NGROK_AUTHTOKEN
          ngrok tcp 443 --log=stdout > ngrok.log &
          sleep 10

      - name: Final Output Link
        run: |
          TCP_ADDR=$(grep -o 'tcp://[-a-zA-Z0-9.]*:[0-9]*' ngrok.log | sed 's/tcp:\/\///')
          ADDR=$(echo $TCP_ADDR | cut -d':' -f1)
          PORT=$(echo $TCP_ADDR | cut -d':' -f2)
          UUID="${{ steps.vars.outputs.uuid }}"
          PUB="${{ steps.vars.outputs.pub }}"
          SID="${{ steps.vars.outputs.sid }}"
          
          # 拼接 Reality 一键导入链接
          LINK="vless://$UUID@$ADDR:$PORT?encryption=none&flow=xtls-rprx-vision&security=reality&sni=www.microsoft.com&fp=chrome&pbk=$PUB&sid=$SID#GFW-Killer"
          
          echo "=================================================="
          echo "✅ 部署成功！"
          echo "--------------------------------------------------"
          echo "一键导入链接 (直接复制到 v2rayNG/Shadowrocket):"
          echo "$LINK"
          echo "--------------------------------------------------"
          echo "地址: $ADDR"
          echo "端口: $PORT"
          echo "=================================================="
