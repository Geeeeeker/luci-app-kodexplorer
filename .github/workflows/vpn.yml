name: Ultimate-Reality-Proxy
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Xray & ngrok
        run: |
          # 安装 Xray
          curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh | sudo bash -s -- install
          # 安装 ngrok
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok

      - name: Generate Reality Config (Stable Python Method)
        id: vars
        run: |
          # 使用 Python 确保密钥生成和文件写入 100% 正确
          python3 <<EOF
          import subprocess, json, os, uuid

          # 调用 xray 生成密钥
          result = subprocess.check_output(["xray", "x25519"]).decode("utf-8")
          lines = result.split('\n')
          private_key = lines[0].split(': ')[1].strip()
          public_key = lines[1].split(': ')[1].strip()
          user_id = str(uuid.uuid4())
          short_id = os.urandom(4).hex()

          config = {
              "inbounds": [{
                  "port": 443,
                  "protocol": "vless",
                  "settings": {
                      "clients": [{"id": user_id, "flow": "xtls-rprx-vision"}],
                      "decryption": "none"
                  },
                  "streamSettings": {
                      "network": "tcp",
                      "security": "reality",
                      "realitySettings": {
                          "show": False,
                          "dest": "www.microsoft.com:443",
                          "xver": 0,
                          "serverNames": ["www.microsoft.com"],
                          "privateKey": private_key,
                          "shortIds": [short_id]
                      }
                  }
              }],
              "outbounds": [{"protocol": "freedom"}]
          }

          with open("config.json", "w") as f:
              json.dump(config, f, indent=2)

          # 输出给 GitHub Actions 变量
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"uuid={user_id}\n")
              f.write(f"pub={public_key}\n")
              f.write(f"sid={short_id}\n")
          EOF

      - name: Start Services
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          # 验证配置文件是否存在
          if [ ! -f config.json ]; then echo "Config file missing!"; exit 1; fi
          
          # 启动服务
          sudo xray -c config.json &
          
          # 启动 ngrok
          if [ -z "$NGROK_AUTHTOKEN" ]; then echo "NGROK_AUTHTOKEN is empty!"; exit 1; fi
          ngrok config add-authtoken $NGROK_AUTHTOKEN
          ngrok tcp 443 --log=stdout > ngrok.log &
          
          sleep 10

      - name: Final Output Link
        run: |
          # 提取 ngrok 地址
          TCP_ADDR=$(grep -o 'tcp://[-a-zA-Z0-9.]*:[0-9]*' ngrok.log | sed 's/tcp:\/\///')
          if [ -z "$TCP_ADDR" ]; then echo "FRP/ngrok failed to start"; cat ngrok.log; exit 1; fi
          
          ADDR=$(echo $TCP_ADDR | cut -d':' -f1)
          PORT=$(echo $TCP_ADDR | cut -d':' -f2)
          UUID="${{ steps.vars.outputs.uuid }}"
          PUB="${{ steps.vars.outputs.pub }}"
          SID="${{ steps
