name: Reality-LocalTunnel-Proxy
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Xray & LocalTunnel
        run: |
          # 1. 安装 Xray
          curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh | sudo bash -s -- install
          # 2. 安装 Node.js 和 LocalTunnel (lt)
          sudo apt-get update
          sudo apt-get install -y nodejs npm
          sudo npm install -g localtunnel

      - name: Generate Reality Config
        id: vars
        run: |
          python3 <<EOF
          import subprocess, json, os, uuid

          # 生成 Reality 密钥
          result = subprocess.check_output(["xray", "x25519"]).decode("utf-8").split('\n')
          priv = result[0].split(': ')[1].strip()
          pub = result[1].split(': ')[1].strip()
          u_id = str(uuid.uuid4())
          s_id = os.urandom(4).hex()

          config = {
              "inbounds": [{
                  "port": 443, "protocol": "vless",
                  "settings": {"clients": [{"id": u_id, "flow": "xtls-rprx-vision"}], "decryption": "none"},
                  "streamSettings": {
                      "network": "tcp", "security": "reality",
                      "realitySettings": {
                          "show": False, "dest": "www.microsoft.com:443", "xver": 0,
                          "serverNames": ["www.microsoft.com"], "privateKey": priv, "shortIds": [s_id]
                      }
                  }
              }],
              "outbounds": [{"protocol": "freedom"}]
          }

          with open("config.json", "w") as f:
              json.dump(config, f)
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"uuid={u_id}\npub={pub}\nsid={s_id}\n")
          EOF

      - name: Start Services
        run: |
          # 1. 清理端口并启动 Xray
          sudo fuser -k 443/tcp || true
          sudo xray run -c "$(pwd)/config.json" > xray_debug.log 2>&1 &
          
          # 2. 使用 LocalTunnel 转发 443 端口
          # 注意：lt 默认转发到随机子域名
          lt --port 443 > lt.log 2>&1 &
          
          sleep 15

      - name: Final Output Link
        env:
          MY_UUID: ${{ steps.vars.outputs.uuid }}
          MY_PUB: ${{ steps.vars.outputs.pub }}
          MY_SID: ${{ steps.vars.outputs.sid }}
        run: |
          # 检查 Xray 状态
          if ! pgrep xray > /dev/null; then
            cat xray_debug.log
            exit 1
          fi

          # 提取 LocalTunnel 域名
          LT_URL=$(grep -o 'https://[a-zA-Z0-9-]*\.loca\.lt' lt.log | sed 's/https:\/\///')
          if [ -z "$LT_URL" ]; then
            echo "❌ LocalTunnel 启动失败，可能是服务端拥堵，请稍后重试。"
            cat lt.log
            exit 1
          fi
          
          # 拼接 Reality 链接
          # 注意：LocalTunnel 转发的是 HTTP/HTTPS 隧道，
          # 对于 Reality 这种原生 TCP 协议，我们需要客户端支持通过域名 SNI 连接
          LINK="vless://${MY_UUID}@${LT_URL}:443?encryption=none&flow=xtls-rprx-vision&security=reality&sni=www.microsoft.com&fp=chrome&pbk=${MY_PUB}&sid=${MY_SID}#Reality-LocalTunnel"
          
          echo "=================================================="
          echo "✅ 部署成功！(基于 LocalTunnel)"
          echo "--------------------------------------------------"
          echo "一键导入链接:"
          echo "$LINK"
          echo "--------------------------------------------------"
          echo "提醒：LocalTunnel 域名在大陆部分地区可能不稳定"
          echo "如果连不上，请尝试重新运行 Workflow 更换域名"
          echo "=================================================="
          
          sleep 21600
