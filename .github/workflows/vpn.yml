name: Cloudflare VLESS Proxy
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Cloudflared & Xray
        run: |
          # 安装 Cloudflared
          curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          # 安装 Xray (支持 VLESS)
          bash -c "$(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)" @ install

      - name: Configure Xray (VLESS + WS)
        run: |
          # 生成一个固定的 UUID
          UUID="d342d11e-d424-4583-b36e-52490062b323"
          
          cat <<EOF > config.json
          {
            "inbounds": [{
              "port": 8080,
              "protocol": "vless",
              "settings": {
                "clients": [{"id": "$UUID"}],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "ws",
                "wsSettings": {"path": "/chat"}
              }
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          EOF
          xray -c config.json &

      - name: Start Cloudflare Tunnel
        run: |
          # 启动隧道，将本地 8080 端口映射到公网
          cloudflared tunnel --url http://localhost:8080 > cf.log 2>&1 &
          sleep 10

      - name: Output Connection Info
        run: |
          # 提取隧道域名
          CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cf.log | head -n 1)
          DOMAIN=$(echo $CF_URL | sed 's/https:\/\///')
          
          echo "=================================================="
          echo "✅ 代理服务器已就绪 (Cloudflare 强力驱动)"
          echo "--------------------------------------------------"
          echo "客户端配置参数 (V2Ray / Clash / V2RayN):"
          echo "地址 (Address): $DOMAIN"
          echo "端口 (Port): 443"
          echo "用户 ID (UUID): d342d11e-d424-4583-b36e-52490062b323"
          echo "传输协议 (Network): ws"
          echo "伪装路径 (Path): /chat"
          echo "底层传输安全 (TLS): 开启 (True)"
          echo "--------------------------------------------------"
          echo "Web 监控链接: $CF_URL/chat (需配合支持 WS 的工具查看)"
          echo "=================================================="
          
          # 保持运行
          sleep 21600
