name: Ultimate-Reality-Proxy
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Xray & ngrok
        run: |
          # 1. 安装 Xray
          curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh | sudo bash -s -- install
          # 2. 安装 ngrok
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok

      - name: Generate Reality Config
        id: vars
        run: |
          python3 <<EOF
          import subprocess, json, os, uuid

          # 获取密钥
          try:
              result = subprocess.check_output(["xray", "x25519"]).decode("utf-8").split('\n')
              priv = result[0].split(': ')[1].strip()
              pub = result[1].split(': ')[1].strip()
          except Exception as e:
              print(f"Error generating keys: {e}")
              exit(1)

          u_id = str(uuid.uuid4())
          s_id = os.urandom(4).hex()

          config = {
              "inbounds": [{
                  "port": 443, "protocol": "vless",
                  "settings": {"clients": [{"id": u_id, "flow": "xtls-rprx-vision"}], "decryption": "none"},
                  "streamSettings": {
                      "network": "tcp", "security": "reality",
                      "realitySettings": {
                          "show": False, "dest": "www.microsoft.com:443", "xver": 0,
                          "serverNames": ["www.microsoft.com"], "privateKey": priv, "shortIds": [s_id]
                      }
                  }
              }],
              "outbounds": [{"protocol": "freedom"}]
          }

          # 强制写入当前工作目录
          with open("config.json", "w") as f:
              json.dump(config, f)
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"uuid={u_id}\npub={pub}\nsid={s_id}\n")
          EOF

      - name: Start Services
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          # 1. 检查配置文件是否真的存在
          if [ ! -f "config.json" ]; then
            echo "❌ 错误：config.json 未生成！"
            exit 1
          fi

          # 2. 释放端口并启动 Xray (使用当前目录的绝对路径)
          sudo fuser -k 443/tcp || true
          CONF_PATH=$(pwd)/config.json
          echo "使用配置文件: $CONF_PATH"
          
          # 启动并把错误输出到文件
          sudo xray run -c "$CONF_PATH" > xray_debug.log 2>&1 &
          
          # 3. 启动 ngrok
          if [ -z "$NGROK_AUTHTOKEN" ]; then echo "❌ 错误：NGROK_AUTHTOKEN 为空"; exit 1; fi
          ngrok config add-authtoken "$NGROK_AUTHTOKEN"
          ngrok tcp 443 --log=stdout > ngrok.log &
          
          sleep 20

      - name: Final Output Link
        env:
          MY_UUID: ${{ steps.vars.outputs.uuid }}
          MY_PUB: ${{ steps.vars.outputs.pub }}
          MY_SID: ${{ steps.vars.outputs.sid }}
        run: |
          # 检查 Xray 状态
          if ! pgrep xray > /dev/null; then
            echo "❌ Xray 启动后崩溃，错误详情："
            cat xray_debug.log
            exit 1
          fi

          # 提取地址
          TCP_ADDR=$(grep -o 'tcp://[-a-zA-Z0-9.]*:[0-9]*' ngrok.log | sed 's/tcp:\/\///')
          if [ -z "$TCP_ADDR" ]; then
            echo "❌ Ngrok 启动失败，日志如下："
            cat ngrok.log
            exit 1
          fi
          
          ADDR=$(echo $TCP_ADDR | cut -d':' -f1)
          PORT=$(echo $TCP_ADDR | cut -d':' -f2)
          
          LINK="vless://${MY_UUID}@${ADDR}:${PORT}?encryption=none&flow=xtls-rprx-vision&security=reality&sni=www.microsoft.com&fp=chrome&pbk=${MY_PUB}&sid=${MY_SID}#Reality-Final"
          
          echo "=================================================="
          echo "✅ 部署成功！"
          echo "一键导入链接:"
          echo "$LINK"
          echo "=================================================="
          
          sleep 21600
